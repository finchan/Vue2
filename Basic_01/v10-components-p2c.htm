<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="vue.js"></script>
</head>
<body>
    <div id="box">
        <navbar myname="List" :myshow="false"></navbar>
        <navbar myname="Home" :myshow="true"></navbar>
        <navbar :myname="parentData" :myshow="true"></navbar>
    </div>
    <script>
        Vue.component('navbar', {
            template: `
                <div>
                    <button>Back</button>NAVBAR--{{myname}}--{{myshow}}<button v-show="myshow">Home</button>
                </div>
            `,
            props:['myname', 'myshow']//接收父组件传过来的属性值 (属性传值)
        });
        var vm = new Vue({
            el: "#box",
            data:{
                parentData: '父组件的状态'
            }         
        });
    </script>
</body>
</html>
