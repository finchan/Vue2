<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bounce-enter-active{
                animation: bounce-in .5s;
        }
        .bounce-leave-active{
            animation: bounce-in 1.5s reverse;
        }
        @keyframes bounce-in {
            0%{
                opacity: 0;
                transform: translateX(100px);
            }
            100%{
                opacity: 1;
                transform: translateX(0px);
            }
        }
    </style>
    <script src="vue.js"></script>
</head>
<body style="overflow-x:hidden;">
    <div id="box">
        <p>
            <keep-alive>
                <transition name="bounce" mode="out-in">
                    <component :is="who"></component>
                </transition>
            </keep-alive>
        </p>
        <footer>
            <ul>
                <li><a @click="who='home'">HOME</a></li>
                <li><a @click="who='list'">LIST</a></li>
                <li><a @click="who='shoppingcart'">SHOPPING CART</a></li>
            </ul>
        </footer>
    </div>
    <script>
        var vm = new Vue({
            el: "#box",
            data: {
                who:'home'
            },
            components: {
                "home":{
                    template:`
                        <div>
                            HOME: <input type="text"/>
                        </div>
                    `
                },
                "list":{
                    template:`
                        <div>
                            LIST:
                        </div>
                    `
                },
                "shoppingcart":{
                    template:`
                        <div>
                            SHOPPING CART
                        </div>
                    `
                }
            }
        });
    </script>
</body>
</html>
