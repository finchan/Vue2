<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="vue.js"></script>
    <title>Document</title>
</head>
<body>
    <div id="box">
        <button @click="handleClick">Click</button>
        <button @click="handleClick($event)">Click2</button>
        <button @click="isShow = !isShow">Click3</button>
        <div v-show="isShow">11111111</div>

        <ul @click="handleULClick">
            <li @click="handleLIClick($event)">
                li Click
            </li>
        </ul>

        <ul @click="handleULClick2">
            <li @click.stop="handleLIClick2">
                li Click
            </li>
        </ul>

        <ul @click.self="handleSelfClick()">
            <li @click="handleClick3">li
        </ul>

        <ul @click.self="handleSelfClick()">
            <li @click.once="handleClick3">li
        </ul>

        <a href="www.baidu.com" @click.prevent="">Baidu</a>
        <br/>
        <input type="text" @keyup="handleKeyup($event)"/>
        <input type="text" @keyup.enter="handleKeyup($event)"/>
    </div>
    <script>
        var vm = new Vue({
            el:'#box',
            data:{
                isShow:false
            },
            methods:{
                handleClick(event) {
                    console.log(event.target);
                    this.isShow = !this.isShow;
                }, 
                handleULClick(){
                    console.log("UL click");
                },
                handleLIClick(ev){
                    ev.stopPropagation();
                    console.log("LI click");
                },
                handleULClick2(){
                    console.log("UL click");
                },
                handleLIClick2(ev){
                    console.log("LI click");
                },
                handleClick3(){
                    console.log("LI click");
                },
                handleSelfClick(){
                    console.log("Self Click");
                },
                handleKeyup(ev) {
                    if(ev.keyCode === 13) {
                        console.log("After entering ENTER");
                    }
                },
                handleKeyup2(ev) {
                    console.log("After entering ENTER");
                }
            }
        });
    </script>
</body>
</html>
